<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltX Admin Login</title>
<style>
:root { --bg:#0d0d1a; --card:#13132b; --border:#1e1e3f; --accent:#6c63ff; --accent2:#00d4ff; --text:#e0e0ff; --muted:#7070a0; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:360px; }
.brand { font-size:28px; font-weight:700; text-align:center; margin-bottom:8px; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { text-align:center; color:var(--muted); font-size:13px; margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.form-control { width:100%; padding:11px 14px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; }
.form-control:focus { outline:none; border-color:var(--accent); }
.btn { width:100%; padding:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:600; cursor:pointer; margin-top:8px; }
.btn:hover { opacity:.9; }
.alert { padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px; background:rgba(255,23,68,.1); border:1px solid #ff1744; color:#ff1744; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">⚡ VoltX</div>
  <div class="subtitle">Admin Panel</div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input class="form-control" name="username" type="text" placeholder="admin" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input class="form-control" name="password" type="password" placeholder="••••••••" required>
    </div>
    <button class="btn" type="submit">Login →</button>
  </form>
</div>
</body>
</html>
